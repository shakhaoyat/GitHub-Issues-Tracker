<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Login</title>

    <!-- style -->
    <link rel="stylesheet" href="style/style.css">

    <!-- Daisy + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <section class="shadow-sm max-w-[520px] w-9/12 md:w-3/12 mx-auto rounded-md p-8 mt-20 md:mt-40">
        <div class="github-head text-center justify-center space-y-6">
            <div class="github-logo flex justify-center">
                <img src="assets/github-logo.png" alt="">
            </div>
            <div class="github-text">
                <h2 class="font-semibold text-[#1F2937] text-xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </div>

        <!-- login -->
        <div class="fieldset mb-7 mt-8">

            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="username-input" type="text" class="input input-bordered w-full rounded-md"
                placeholder="Enter Username" />
            <p class="text-sm text-primary mt-1">Default: admin</p>

            <label class="label font-medium text-[#1F2937] mt-4">Password</label>
            <input id="password-input" type="password" class="input input-bordered w-full rounded-md"
                placeholder="Enter Password" />
            <p class="text-sm text-primary mt-1">Default: admin123</p>

            <button id="sign-btn" class="btn btn-primary w-full mt-6 rounded-md">Sign In</button>
        </div>
        <!-- OR separator -->
        <div class="text-center my-4">
            <p class="text-[#94A3B8] text-sm font-medium">OR</p>
        </div>
        <!-- default pass -->
        <div class="text-center">
            <p class="text-[#64748B] text-sm font-medium mb-3">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-4 rounded-md border border-[#E2E8F0]">
                <p class="text-sm text-[#1F2937]"><span class="font-semibold">Username:</span> admin</p>
                <p class="text-sm text-[#1F2937] mt-1"><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </section>




    <script src="script/index.js"></script>
</body>

</html>
