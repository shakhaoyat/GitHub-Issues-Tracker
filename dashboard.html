<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitHub Issues Tracker</title>
      <!-- Tailwind CSS & DaisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
            .issue-card.open {
                  border-top: 4px solid #1a7f37;
            }

            .issue-card.closed {
                  border-top: 4px solid #8250df;
            }
      </style>
</head>

<body class="bg-base-200 min-h-screen">
      <!-- Navbar -->
      <nav class="navbar bg-base-100 shadow-md border-b border-base-300">
            <div class="navbar-start">
                  <div class="flex items-center gap-3">
                        <img src="./assets/github-logo.png" alt="GitHub" class="w-8 h-8">
                        <span class="text-xl font-semibold">GitHub Issues Tracker</span>
                  </div>
            </div>

            <div class="navbar-end gap-2">
                  <input type="text" id="searchInput" placeholder="🔍 Search issues..."
                        class="input input-bordered w-full max-w-xs">
                  <button id="newIssueBtn" class="btn btn-primary">+ New Issue</button>
            </div>
      </nav>

      <!-- Main Content -->
      <main class="container mx-auto px-4 py-8 max-w-7xl">
            <!-- Tab Section -->
            <div class="card bg-base-100 shadow-lg mb-6">
                  <!-- Tabs -->
                  <div class="tabs tabs-boxed bg-transparent border-b border-base-300 rounded-none p-4 pb-0">
                        <button class="tab tab-active tab-bordered" data-tab="all" id="tabAll">All</button>
                        <button class="tab tab-bordered" data-tab="open" id="tabOpen">Open</button>
                        <button class="tab tab-bordered" data-tab="closed" id="tabClosed">Closed</button>
                  </div>

                  <!-- Issue Count Section -->
                  <div class="card-body">
                        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                              <div class="flex items-center gap-4">
                                    <img src="./assets/Aperture.png" alt="Issues Icon" class="w-10 h-10">
                                    <div>
                                          <span id="issueCount" class="text-2xl font-bold">0 Issues</span>
                                          <p class="text-sm text-base-content/70">Track and manage your project issues
                                          </p>
                                    </div>
                              </div>
                              <div class="flex gap-6">
                                    <div class="flex items-center gap-2">
                                          <img src="./assets/Open-Status.png" alt="Open" class="w-5 h-5">
                                          <span id="openCount" class="font-medium">0 Open</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                          <img src="./assets/Closed- Status .png" alt="Closed" class="w-5 h-5">
                                          <span id="closedCount" class="font-medium">0 Closed</span>
                                    </div>
                              </div>
                        </div>
                  </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="text-center py-16" style="display: none;">
                  <span class="loading loading-spinner loading-lg text-primary"></span>
                  <p class="mt-4 text-base-content/70">Loading issues...</p>
            </div>

            <!-- Issues Grid -->
            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                  <!-- Issue cards will be dynamically inserted here -->
            </div>

            <!-- No Results Message -->
            <div id="noResults" class="text-center py-16" style="display: none;">
                  <p class="text-xl text-base-content/70">No issues found</p>
            </div>
      </main>

      <!-- Modal for Issue Details -->
      <input type="checkbox" id="issueModal" class="modal-toggle" />
      <div class="modal">
            <div class="modal-box max-w-2xl">
                  <label for="issueModal" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</label>
                  <div id="modalBody" class="py-4">
                        <!-- Issue details will be dynamically inserted here -->
                  </div>
            </div>
            <label class="modal-backdrop" for="issueModal"></label>
      </div>

      <script src="app.js"></script>
</body>

</html>
<!-- Issue details will be dynamically inserted here -->
</div>
</div>
</div>

<script src="app.js"></script>
</body>

</html>
